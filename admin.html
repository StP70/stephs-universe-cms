<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steph's Universe CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-elevated: #141414;
      --bg-card: #1a1a1a;
      --bg-input: #111;
      --text: #f5f5f5;
      --text-muted: #a3a3a3;
      --accent: #10b981;
      --accent-light: #6ee7b7;
      --accent-glow: rgba(16,185,129,.25);
      --border: rgba(255,255,255,.08);
      --border-accent: rgba(16,185,129,.3);
      --danger: #ef4444;
      --warning: #fbbf24;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- HEADER ---- */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: .8rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-header h1 {
      font-size: 1.1rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: -.02em;
    }
    .header-actions { display: flex; gap: .5rem; }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--bg-card);
      color: var(--text-muted);
      font-family: inherit;
      font-size: .8rem; font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn-accent {
      background: var(--accent); color: #000;
      border-color: var(--accent);
    }
    .btn-accent:hover { background: var(--accent-light); border-color: var(--accent-light); color: #000; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm {
      padding: .3rem .6rem; font-size: .72rem;
    }
    .btn-icon {
      padding: .35rem; border-radius: var(--radius-sm);
      min-width: 30px; justify-content: center;
    }

    /* ---- LAYOUT ---- */
    .app-body { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ---- FORM ELEMENTS ---- */
    .field { margin-bottom: 1rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    label {
      display: block;
      font-size: .72rem; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: .35rem;
    }
    input, select, textarea {
      width: 100%;
      padding: .55rem .8rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: .875rem;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    textarea { resize: vertical; min-height: 70px; }
    input[type="color"] {
      width: 44px; height: 36px; padding: 2px;
      cursor: pointer; border-radius: var(--radius-sm);
    }
    .color-field { display: flex; align-items: end; gap: .5rem; }
    .color-field input[type="text"] { flex: 1; }

    /* ---- SECTIONS ---- */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .panel-title {
      font-size: .8rem; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--accent);
      padding: 1.2rem 1.5rem .6rem;
    }
    .panel-body { padding: .6rem 1.5rem 1.5rem; }

    /* ---- ACCORDION ---- */
    .sections-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .sections-header h2 {
      font-size: .8rem; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--accent);
    }
    .section-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: .6rem;
      overflow: hidden;
      transition: border-color .2s;
    }
    .section-item.open { border-color: var(--border-accent); }
    .section-head {
      display: flex; align-items: center;
      padding: .7rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background .2s;
    }
    .section-head:hover { background: var(--bg-elevated); }
    .section-arrow {
      font-size: .7rem; color: var(--text-muted);
      margin-right: .6rem;
      transition: transform .2s;
    }
    .section-item.open .section-arrow { transform: rotate(90deg); }
    .section-head-title {
      flex: 1;
      font-size: .875rem; font-weight: 500;
    }
    .section-head-title span {
      color: var(--text-muted); font-weight: 400;
      font-size: .78rem; margin-left: .4rem;
    }
    .section-actions { display: flex; gap: .25rem; }
    .section-body {
      display: none;
      padding: 1rem 1.2rem 1.2rem;
      border-top: 1px solid var(--border);
    }
    .section-item.open .section-body { display: block; }

    /* ---- BLOCK HEADERS ---- */
    .block-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1.2rem; margin-bottom: .6rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }
    .block-header h4 {
      font-size: .75rem; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
    }

    /* ---- DYNAMIC LISTS ---- */
    .list-item {
      display: flex; gap: .5rem; align-items: start;
      margin-bottom: .5rem;
      padding: .6rem;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .list-item .list-fields { flex: 1; display: flex; flex-direction: column; gap: .4rem; }
    .list-item .list-fields-row { display: flex; gap: .5rem; }
    .list-item .list-fields-row input { flex: 1; }

    /* ---- FILE INPUT ---- */
    .file-input { display: none; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 640px) {
      .field-row, .field-row-3 { grid-template-columns: 1fr; }
      .app-header { flex-wrap: wrap; gap: .5rem; }
      .app-body { padding: 1.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">

</header>

        </div>
      </div>

        <div class="field">

        <div class="field">
          <label>Sprache</label>
          <input type="text" data-field="lang" placeholder="de" maxlength="5">
        </div>
        <div class="field">
          <label>Akzentfarbe</label>
          <div class="color-field">
            <input type="color" data-field="accentColor" value="#10b981">
            <input type="text" data-field="accentColor" placeholder="#10b981">
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Helle Akzentfarbe</label>
          <div class="color-field">
            <input type="color" data-field="accentLight" value="#6ee7b7">
            <input type="text" data-field="accentLight" placeholder="#6ee7b7">
          </div>
        </div>
        <div class="field">
          <label>Icon URL</label>
          <div style="display:flex;gap:.5rem;align-items:center">
            <input type="text" data-field="iconUrl" placeholder="assets/icon.png">
            <button class="btn btn-sm" onclick="pickSettingsImage('iconUrl')" title="Bild wählen">Datei</button>
          </div>
          <input type="file" accept="image/*" style="display:none" id="filePick-iconUrl" onchange="handleSettingsImagePick('iconUrl',event)">
        </div>
      </div>
      <div class="field">
        <label>Icon Link</label>
        <input type="text" data-field="iconLink" placeholder="https://flexgate.at">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Hero Hintergrundbild</label>
          <div style="display:flex;gap:.5rem;align-items:center">
            <input type="text" data-field="heroBg" placeholder="https://images.unsplash.com/...">
            <button class="btn btn-sm" onclick="pickSettingsImage('heroBg')" title="Bild wählen">Datei</button>
          </div>
          <input type="file" accept="image/*" style="display:none" id="filePick-heroBg" onchange="handleSettingsImagePick('heroBg',event)">
        </div>
        <div class="field">
          <label>Hero Badge</label>
          <input type="text" data-field="heroBadge" placeholder="Wissenschaftlich fundiert">
        </div>
      </div>
      <div class="field">
        <label>Hero Titel (HTML erlaubt)</label>
        <textarea data-field="heroTitle" rows="2" placeholder="Autophagie<br>&amp; Fasten"></textarea>
      </div>
      <div class="field">
        <label>Hero Untertitel</label>
        <textarea data-field="heroSubtitle" rows="3" placeholder="Kurze Beschreibung deiner Seite..."></textarea>
      </div>
      <div class="field">
        <label>CTA Button Text</label>
        <input type="text" data-field="ctaText" placeholder="Mehr erfahren">
      </div>
      <div class="field">
        <label>Footer (HTML erlaubt)</label>
        <textarea data-field="footerText" rows="4" placeholder="&copy; 2026 &middot; by ..."></textarea>
      </div>
    </div>
  </div>

  <!-- SEKTIONEN -->
  <div class="sections-header">
    <h2>Sektionen</h2>
    <button class="btn btn-sm" onclick="addSection()">+ Neue Sektion</button>
  </div>
  <div id="sectionsContainer"></div>

</main>

function bindSettings() {
  document.querySelectorAll('[data-field]').forEach(el => {
    if (el.closest('.section-item')) return; // skip section fields
    el.addEventListener('input', () => {
      const field = el.dataset.field;
      pageData[field] = el.value;
      // Sync color pickers with text inputs
      if (el.type === 'color') {
        const textInput = el.parentElement.querySelector('input[type="text"]');
        if (textInput) textInput.value = el.value;
      } else if (el.type === 'text' && el.parentElement.classList.contains('color-field')) {
        const colorInput = el.parentElement.querySelector('input[type="color"]');
        if (colorInput && /^#[0-9a-f]{6}$/i.test(el.value)) colorInput.value = el.value;
      }
    });
  });
}

function loadSettingsToUI() {
  document.querySelectorAll('[data-field]').forEach(el => {
    if (el.closest('.section-item')) return;
    const field = el.dataset.field;
    if (pageData[field] !== undefined) {
      el.value = pageData[field];
    }
  });
}

// ============================================================
// SECTIONS
// ============================================================
function addSection() {
  pageData.sections.push({
    id: 'section-' + (pageData.sections.length + 1),
    navLabel: 'Neue Sektion',
    label: 'LABEL',
    title: '',
    image: '',
    paragraphs: [],
    quote: null,
    cards: [],
    timeline: [],
    videos: [],
    warning: null
  });
  renderSections();
  // Open the new section
  const items = document.querySelectorAll('.section-item');
  if (items.length) toggleSection(items.length - 1);
}

function removeSection(idx) {
  if (!confirm('Sektion "' + (pageData.sections[idx].navLabel || 'Unbenannt') + '" wirklich löschen?')) return;
  pageData.sections.splice(idx, 1);
  renderSections();
}

function moveSectionUp(idx) {
  if (idx === 0) return;
  const tmp = pageData.sections[idx];
  pageData.sections[idx] = pageData.sections[idx - 1];
  pageData.sections[idx - 1] = tmp;
  renderSections();
}

function moveSectionDown(idx) {
  if (idx >= pageData.sections.length - 1) return;
  const tmp = pageData.sections[idx];
  pageData.sections[idx] = pageData.sections[idx + 1];
  pageData.sections[idx + 1] = tmp;
  renderSections();
}

function toggleSection(idx) {
  const items = document.querySelectorAll('.section-item');
  items.forEach((item, i) => {
    if (i === idx) item.classList.toggle('open');
    else item.classList.remove('open');
  });
}

function updateSectionField(idx, field, value) {
  pageData.sections[idx][field] = value;
  // Update header label live
  if (field === 'navLabel' || field === 'label') {
    const head = document.querySelectorAll('.section-head-title')[idx];
    if (head) {
      const s = pageData.sections[idx];
      head.innerHTML = (s.navLabel || 'Unbenannt') + ' <span>[' + (s.label || '') + ']</span>';
    }
  }
}

// ---- Paragraphs ----
function addParagraph(idx) {
  pageData.sections[idx].paragraphs.push('');
  renderSectionBody(idx);
}
function removeParagraph(sIdx, pIdx) {
  pageData.sections[sIdx].paragraphs.splice(pIdx, 1);
  renderSectionBody(sIdx);
}
function updateParagraph(sIdx, pIdx, value) {
  pageData.sections[sIdx].paragraphs[pIdx] = value;
}

// ---- Cards ----
function addCard(idx) {
  if (!pageData.sections[idx].cards) pageData.sections[idx].cards = [];
  pageData.sections[idx].cards.push({ icon: '', title: '', text: '' });
  renderSectionBody(idx);
}
function removeCard(sIdx, cIdx) {
  pageData.sections[sIdx].cards.splice(cIdx, 1);
  renderSectionBody(sIdx);
}
function updateCard(sIdx, cIdx, field, value) {
  pageData.sections[sIdx].cards[cIdx][field] = value;
}

// ---- Timeline ----
function addTimelineItem(idx) {
  if (!pageData.sections[idx].timeline) pageData.sections[idx].timeline = [];
  pageData.sections[idx].timeline.push({ time: '', text: '' });
  renderSectionBody(idx);
}
function removeTimelineItem(sIdx, tIdx) {
  pageData.sections[sIdx].timeline.splice(tIdx, 1);
  renderSectionBody(sIdx);
}
function updateTimelineItem(sIdx, tIdx, field, value) {
  pageData.sections[sIdx].timeline[tIdx][field] = value;
}

// ---- Videos ----
function addVideo(idx) {
  if (!pageData.sections[idx].videos) pageData.sections[idx].videos = [];
  pageData.sections[idx].videos.push({ url: '', thumbnail: '', title: '', description: '', badge: 'YouTube', badgeType: 'youtube' });
  renderSectionBody(idx);
}
function removeVideo(sIdx, vIdx) {
  pageData.sections[sIdx].videos.splice(vIdx, 1);
  renderSectionBody(sIdx);
}
function updateVideo(sIdx, vIdx, field, value) {
  pageData.sections[sIdx].videos[vIdx][field] = value;
  // Auto-thumbnail for YouTube (update only the thumbnail input, not full re-render)
  if (field === 'url') {
    const match = value.match(/(?:youtube\.com\/watch\?v=|youtube\.com\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (match) {
      const thumbUrl = 'https://img.youtube.com/vi/' + match[1] + '/hqdefault.jpg';
      pageData.sections[sIdx].videos[vIdx].thumbnail = thumbUrl;
      // Update thumbnail input without re-rendering
      const body = document.getElementById('sectionBody-' + sIdx);
      if (body) {
        const thumbInputs = body.querySelectorAll('input[placeholder*="Thumbnail"]');
        if (thumbInputs[vIdx]) thumbInputs[vIdx].value = thumbUrl;
      }
    }
  }
}

}
function handleSettingsImagePick(field, event) {

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// JSON IMPORT / EXPORT
// ============================================================
function exportJSON() {
  // Clean up empty optional fields
  const data = JSON.parse(JSON.stringify(pageData));
  data.sections = data.sections.map(s => {
    const clean = { id: s.id, navLabel: s.navLabel, label: s.label, title: s.title };
    if (s.image) clean.image = s.image;
    if (s.paragraphs && s.paragraphs.length && s.paragraphs.some(p => p.trim())) {
      clean.paragraphs = s.paragraphs.filter(p => p.trim());
    }
    if (s.quote && (s.quote.text || s.quote.cite)) clean.quote = s.quote;
    if (s.cards && s.cards.length && s.cards.some(c => c.title || c.text)) {
      clean.cards = s.cards.filter(c => c.title || c.text);
    }
    if (s.timeline && s.timeline.length && s.timeline.some(t => t.time || t.text)) {
      clean.timeline = s.timeline.filter(t => t.time || t.text);
    }
    if (s.videos && s.videos.length && s.videos.some(v => v.url)) {
      clean.videos = s.videos.filter(v => v.url);
    }
    if (s.warning && (s.warning.title || s.warning.text)) clean.warning = s.warning;
    return clean;
  });

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (data.slug || 'page') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.slug && !data.title) {
        alert('Ungültige JSON-Datei: "slug" oder "title" fehlt.');
        return;
      }
      // Merge with defaults
      pageData = {
        slug: '', title: '', theme: 'dark', lang: 'de',
        accentColor: '#10b981', accentLight: '#6ee7b7',
        iconUrl: 'assets/icon.png', iconLink: '',
        heroBg: '', heroBadge: '', heroTitle: '', heroSubtitle: '',
        ctaText: 'Mehr erfahren', footerText: '',
        sections: [],
        ...data
      };
      // Ensure sections have all fields
      pageData.sections = pageData.sections.map(s => ({
        id: '', navLabel: '', label: '', title: '', image: '',
        paragraphs: [], quote: null, cards: [], timeline: [], videos: [], warning: null,
        ...s
      }));
      loadSettingsToUI();
      renderSections();
    } catch (err) {
      alert('Fehler beim Laden: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset for re-upload
}

// ---- Template Engine (from build.js) ----
function render(tpl, data) {
  data.firstSectionId = data.sections[0]?.id || '';
  if (!data.theme) data.theme = 'dark';
  if (!data.lang) data.lang = 'de';
  let html = tpl;
  // Triple-brace {{{key}}} BEFORE double-brace {{key}} to avoid partial match
  html = html.replace(/\{\{\{(\w+)\}\}\}/g, (_, key) => {
    if (key === 'this') return `{{{${key}}}}`;
    return data[key] !== undefined ? data[key] : '';
  });
  html = html.replace(/\{\{(\w+)\}\}/g, (_, key) => {
    if (key === 'this' || key === 'each' || key === 'if' || key === 'unless') return `{{${key}}}`;
    return data[key] !== undefined ? data[key] : '';
  });
  html = html.replace(/\{\{#if (\w+)\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, key, content) => {
    return data[key] ? content.replace(/\{\{(\w+)\}\}/g, (__, k) => data[k] || '') : '';
  });
  // Find outer #each sections (handles nested #each)
  function findOuterEach(str) {
    const all = [];
    const re = /\{\{#each sections\}\}/g;
    let m;
    while ((m = re.exec(str)) !== null) {
      const s = m.index, cs = s + m[0].length;
      let d = 1, p = cs;
      while (d > 0 && p < str.length) {
        const no = str.indexOf('{{#each', p), nc = str.indexOf('{{/each}}', p);
        if (nc === -1) break;
        if (no !== -1 && no < nc) { d++; p = no + 7; }
        else { d--; if (d === 0) all.push({ 0: str.substring(s, nc + 9), 1: str.substring(cs, nc) }); p = nc + 9; }
      }
    }
    return all;
  }
  const sectionMatches = findOuterEach(html);
  const sectionMatch = sectionMatches.length > 1 ? sectionMatches[1] : sectionMatches[0];
  if (sectionMatch) {
    const sectionTpl = sectionMatch[1];
    const sectionsHtml = data.sections.map((section, idx) => {
      let s = sectionTpl;
      s = s.replace(/\{\{#unless @first\}\}([\s\S]*?)\{\{\/unless\}\}/, (_, c) => idx === 0 ? '' : c);
      // Process all block constructs BEFORE simple field replacement
      s = s.replace(/\{\{#if this\.image\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, c) => {
        if (!section.image) return '';
        return c.replace(/\{\{this\.image\}\}/g, section.image).replace(/\{\{this\.title\}\}/g, section.title);
      });
      s = s.replace(/\{\{#each this\.paragraphs\}\}([\s\S]*?)\{\{\/each\}\}/g, (_, c) => {
        if (!section.paragraphs) return '';
        return section.paragraphs.map((p, pi) => {
          let r = c.replace(/\{\{\{this\}\}\}/g, p);
          r = r.replace(/\{\{#unless @first\}\}([\s\S]*?)\{\{\/unless\}\}/g, (__, inner) => pi === 0 ? '' : inner);
          return r;
        }).join('\n');
      });
      s = s.replace(/\{\{#if this\.quote\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, c) => {
        if (!section.quote) return '';
        return c.replace(/\{\{this\.quote\.text\}\}/g, section.quote.text).replace(/\{\{this\.quote\.cite\}\}/g, section.quote.cite);
      });
      s = s.replace(/\{\{#if this\.cards\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, c) => {
        if (!section.cards) return '';
        const m = c.match(/\{\{#each this\.cards\}\}([\s\S]*?)\{\{\/each\}\}/);
        if (!m) return c;
        return c.replace(m[0], section.cards.map(card => m[1].replace(/\{\{this\.icon\}\}/g, card.icon).replace(/\{\{this\.title\}\}/g, card.title).replace(/\{\{this\.text\}\}/g, card.text)).join('\n'));
      });
      s = s.replace(/\{\{#if this\.timeline\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, c) => {
        if (!section.timeline) return '';
        const m = c.match(/\{\{#each this\.timeline\}\}([\s\S]*?)\{\{\/each\}\}/);
        if (!m) return c;
        return c.replace(m[0], section.timeline.map(t => m[1].replace(/\{\{this\.time\}\}/g, t.time).replace(/\{\{this\.text\}\}/g, t.text)).join('\n'));
      });
      s = s.replace(/\{\{#if this\.videos\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, c) => {
        if (!section.videos) return '';
        const m = c.match(/\{\{#each this\.videos\}\}([\s\S]*?)\{\{\/each\}\}/);
        if (!m) return c;
        return c.replace(m[0], section.videos.map(v => m[1].replace(/\{\{this\.url\}\}/g, v.url).replace(/\{\{this\.thumbnail\}\}/g, v.thumbnail).replace(/\{\{this\.title\}\}/g, v.title).replace(/\{\{this\.description\}\}/g, v.description).replace(/\{\{this\.badge\}\}/g, v.badge).replace(/\{\{this\.badgeType\}\}/g, v.badgeType)).join('\n'));
      });
      s = s.replace(/\{\{#if this\.warning\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, c) => {
        if (!section.warning) return '';
        return c.replace(/\{\{this\.warning\.title\}\}/g, section.warning.title).replace(/\{\{this\.warning\.text\}\}/g, section.warning.text);
      });
      // LAST: simple section fields (only remaining {{this.X}} not inside blocks)
      s = s.replace(/\{\{this\.(\w+)\}\}/g, (_, key) => typeof section[key] === 'string' ? section[key] : '');
      return s;
    }).join('\n');
    html = html.replace(sectionMatch[0], sectionsHtml);
  }
  const navMatch = html.match(/\{\{#each sections\}\}([\s\S]*?)\{\{\/each\}\}/);
  if (navMatch) {
    html = html.replace(navMatch[0], data.sections.map(s => navMatch[1].replace(/\{\{this\.id\}\}/g, s.id).replace(/\{\{this\.navLabel\}\}/g, s.navLabel)).join('\n'));
  }
  html = html.replace(/\{\{footerText\}\}/g, data.footerText || '');
  return html;
}

<script>
  const fadeObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.fade-up').forEach(el => fadeObserver.observe(el));
  const navLinks = document.querySelectorAll('.nav-links a');
  const sectionIds = [];
  navLinks.forEach(link => { const id = link.getAttribute('href').replace('#', ''); if (document.getElementById(id)) sectionIds.push(id); });
  function updateActiveNav() { const scrollY = window.scrollY; const navHeight = document.querySelector('nav').offsetHeight; let current = ''; sectionIds.forEach(id => { const el = document.getElementById(id); if (el && scrollY >= el.offsetTop - navHeight - 80) current = id; }); navLinks.forEach(link => { link.classList.remove('active'); if (link.getAttribute('href') === '#' + current) link.classList.add('active'); }); }
  window.addEventListener('scroll', updateActiveNav, { passive: true });
  updateActiveNav();
  navLinks.forEach(link => { link.addEventListener('click', () => { navLinks.forEach(l => l.classList.remove('active')); link.classList.add('active'); }); });
<\/script>
